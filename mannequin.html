<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealityX — Virtual Fitting Room</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0b; --panel:#111113; --border:#222226;
  --accent:#c8f542; --text:#ece9e3; --muted:#555560; --deep:#0e0e10;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; border-bottom:1px solid var(--border);
  background:var(--panel); position:relative; z-index:100;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px; color:var(--accent); }
.logo span { color:var(--text); opacity:0.5; }
.hm { display:flex; gap:20px; font-size:11px; color:var(--muted); }
.hm strong { color:var(--accent); font-weight:500; }
.btn {
  background:transparent; border:1px solid var(--border); color:var(--text);
  padding:7px 14px; border-radius:6px; font-family:'DM Sans',sans-serif;
  font-size:12px; cursor:pointer; transition:all 0.2s;
}
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
.btn.primary:hover { background:#d4ff50; }

.main { display:flex; flex:1; overflow:hidden; position:relative; }

/* LEFT */
.left {
  width:200px; background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:relative; z-index:50;
}
.panel-title {
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px;
  color:var(--muted); padding:16px 16px 10px; border-bottom:1px solid var(--border);
}
.cloth-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
.cloth-list::-webkit-scrollbar { width:3px; }
.cloth-list::-webkit-scrollbar-thumb { background:var(--border); }
.cloth-card {
  background:var(--deep); border:1px solid var(--border); border-radius:10px;
  padding:10px; cursor:grab; transition:all 0.2s; user-select:none;
}
.cloth-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 20px rgba(200,245,66,0.08); }
.cloth-card:active { cursor:grabbing; }
.cloth-preview {
  width:100%; height:100px; background:#161618; border-radius:6px;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.cloth-preview img { max-width:100%; max-height:100%; object-fit:contain; }
.cloth-name { font-size:11px; color:var(--muted); margin-top:7px; text-align:center; }
.cloth-type { font-size:9px; color:var(--accent); text-align:center; margin-top:2px; letter-spacing:1.5px; text-transform:uppercase; }
.add-btn {
  margin:10px; padding:9px; background:transparent; border:1px dashed var(--border);
  border-radius:8px; color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:11px; cursor:pointer; transition:all 0.2s;
}
.add-btn:hover { border-color:var(--accent); color:var(--accent); }

/* STAGE */
.stage { flex:1; position:relative; overflow:hidden; }
#c { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }
.drop-overlay {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(200,245,66,0.03); border:2px dashed rgba(200,245,66,0.25);
  opacity:0; transition:opacity 0.2s; pointer-events:none; z-index:10;
}
.drop-overlay.on { opacity:1; }
.drop-overlay span { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:var(--accent); }
.hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--muted); letter-spacing:1px; pointer-events:none; z-index:10; }

/* RIGHT */
.right {
  width:200px; background:var(--panel); border-left:1px solid var(--border);
  display:flex; flex-direction:column; position:relative; z-index:50;
}
.info-block { padding:16px; border-bottom:1px solid var(--border); }
.mrow { display:flex; justify-content:space-between; margin-bottom:8px; }
.mrow .ml { font-size:11px; color:var(--muted); }
.mrow .mv { font-size:12px; font-weight:500; }
.mrow .mv small { font-size:9px; color:var(--muted); }
.worn-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
.worn-item {
  display:flex; align-items:center; gap:8px; padding:7px 8px;
  background:var(--deep); border-radius:7px; border:1px solid var(--border);
}
.swatch { width:28px; height:28px; border-radius:4px; flex-shrink:0; }
.wi-name { font-size:10px; color:var(--text); }
.wi-type { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.rm { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; }
.rm:hover { color:#ff5555; }
.empty { font-size:11px; color:var(--muted); text-align:center; padding:20px 10px; line-height:1.7; }
.controls { display:flex; gap:6px; padding:12px; border-top:1px solid var(--border); }

/* Processing overlay */
#proc {
  position:fixed; inset:0; background:rgba(10,10,11,0.9);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; z-index:200;
}
#proc.on { display:flex; }
.spin {
  width:36px; height:36px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#proc p { font-size:12px; color:var(--accent); margin-top:12px; letter-spacing:1px; }

/* Toast */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--accent); color:#000; padding:9px 18px;
  border-radius:8px; font-size:12px; font-weight:500;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index:300; pointer-events:none;
}
#toast.on { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Reality<span>X</span></div>
  <div class="hm">
    <span>Height <strong id="hh">175cm</strong></span>
    <span>Chest <strong id="hc">95cm</strong></span>
    <span>Waist <strong id="hw">80cm</strong></span>
    <span>Hips <strong id="hhip">98cm</strong></span>
    <span>Arms <strong id="ha">65cm</strong></span>
  </div>
  <button class="btn" onclick="document.getElementById('jf').click()">⊕ Load Measurements</button>
  <input type="file" id="jf" accept=".json" style="display:none" onchange="loadJSON(event)">
</header>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="panel-title">Wardrobe</div>
    <div class="cloth-list" id="cloth-list"></div>
    <button class="add-btn" onclick="document.getElementById('imgf').click()">+ Add clothing item</button>
    <input type="file" id="imgf" accept="image/*" style="display:none" onchange="addItem(event)">
  </div>

  <!-- 3D STAGE -->
  <div class="stage" id="stage"
    ondragover="dragOver(event)"
    ondragleave="dragLeave(event)"
    ondrop="dropItem(event)">
    <canvas id="c"></canvas>
    <div class="drop-overlay" id="drop-overlay"><span>Drop to Dress</span></div>
    <div class="hint">Drag to rotate · Scroll to zoom</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="info-block">
      <div class="panel-title" style="padding:0 0 14px">Measurements</div>
      <div class="mrow"><span class="ml">Height</span><span class="mv" id="rh">175<small>cm</small></span></div>
      <div class="mrow"><span class="ml">Chest</span><span class="mv" id="rc">95<small>cm</small></span></div>
      <div class="mrow"><span class="ml">Waist</span><span class="mv" id="rw">80<small>cm</small></span></div>
      <div class="mrow"><span class="ml">Hips</span><span class="mv" id="rhip">98<small>cm</small></span></div>
      <div class="mrow"><span class="ml">Arms</span><span class="mv" id="ra">65<small>cm</small></span></div>
      <div class="mrow"><span class="ml">Legs</span><span class="mv" id="rl">90<small>cm</small></span></div>
    </div>
    <div class="panel-title" style="padding:16px 16px 10px">Wearing</div>
    <div class="worn-list" id="worn-list">
      <div class="empty" id="empty-msg">Drag clothing onto the mannequin to try it on</div>
    </div>
    <div class="controls">
      <button class="btn" style="flex:1" onclick="clearOutfit()">Clear</button>
      <button class="btn primary" style="flex:1" onclick="saveOutfit()">Save</button>
    </div>
  </div>

</div>

<!-- Processing overlay -->
<div id="proc"><div class="spin"></div><p>Removing background…</p></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// MEASUREMENTS STATE
// ═══════════════════════════════════════════════
let M = {
  height_cm:175, chest_cm:95, waist_cm:80, hips_cm:98,
  shoulders_cm:44, arm_length_cm:65, leg_length_cm:90, torso_length_cm:50
};
let wearing   = {};
let dragData  = null;
let items     = [];

// ═══════════════════════════════════════════════
// THREE.JS
// ═══════════════════════════════════════════════
const canvas   = document.getElementById('c');
const stageEl  = document.getElementById('stage');

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x0a0a0b, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.01, 100);
camera.position.set(0, 0.3, 3.5);
camera.lookAt(0, 0, 0);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(3, 5, 4);
key.castShadow = true;
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899ff, 0.5);
fill.position.set(-3, 2, -2);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xc8f542, 0.25);
rim.position.set(0, 4, -5);
scene.add(rim);

// Floor
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(2, 64),
  new THREE.MeshStandardMaterial({ color:0x111114, roughness:0.9 })
);
floor.rotation.x = -Math.PI/2;
floor.position.y = -1.6;
floor.receiveShadow = true;
scene.add(floor);

// Mannequin + clothing groups
const root     = new THREE.Group();
const clothGrp = new THREE.Group();
scene.add(root);

const BODY_MAT = new THREE.MeshStandardMaterial({ color:0x282830, roughness:0.55, metalness:0.25 });
const DARK_MAT = new THREE.MeshStandardMaterial({ color:0x1a1a22, roughness:0.7,  metalness:0.1  });

// Smooth lathe torso
function latheTorso(rTop, rMid, rBot, h, segs=32) {
  const pts = [];
  for (let i=0; i<=24; i++) {
    const t = i/24;
    let r;
    if (t < 0.5) {
      const u = t*2;
      r = rTop*(1-u*u) + rMid*u*u;
    } else {
      const u = (t-0.5)*2;
      r = rMid*(1-u) + rBot*u;
    }
    pts.push(new THREE.Vector2(r, h/2 - t*h));
  }
  return new THREE.LatheGeometry(pts, segs);
}

let parts = {};

function buildMannequin() {
  // Clear mannequin (keep clothGrp)
  while (root.children.length) root.remove(root.children[0]);
  root.add(clothGrp);
  parts = {};

  const hs   = M.height_cm    / 175;
  const cs   = M.chest_cm     / 95;
  const ws   = M.waist_cm     / 80;
  const hpS  = M.hips_cm      / 98;
  const ss   = M.shoulders_cm / 44;
  const arS  = M.arm_length_cm / 65;
  const lgS  = M.leg_length_cm / 90;
  const tsS  = M.torso_length_cm / 50;

  const Y0    = -1.6;  // floor
  const legH  = 0.75 * lgS;
  const torH  = 0.52 * tsS;
  const neckH = 0.09;
  const headR = 0.115 * hs;

  const chestR = 0.155 * cs;
  const waistR = 0.115 * ws;
  const hipR   = 0.165 * hpS;
  const sW     = 0.215 * ss;

  const torsoY = Y0 + legH + torH/2;
  const hipY   = Y0 + legH;
  const neckY  = Y0 + legH + torH + neckH/2;
  const headY  = Y0 + legH + torH + neckH + headR + 0.01;

  parts = { torsoY, torH, chestR, waistR, hipR, hipY, legH, sW };

  function add(geo, mat, x,y,z, rx=0,ry=0,rz=0) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x,y,z);
    m.rotation.set(rx,ry,rz);
    m.castShadow = true;
    root.add(m);
    return m;
  }

  // HEAD
  add(new THREE.SphereGeometry(headR,32,32), BODY_MAT, 0,headY,0);

  // NECK
  add(new THREE.CylinderGeometry(0.05,0.055,neckH,20), DARK_MAT, 0,neckY,0);

  // TORSO (smooth lathe)
  add(latheTorso(chestR, waistR, hipR, torH), BODY_MAT, 0,torsoY,0);

  // SHOULDER CAPS
  [-1,1].forEach(s => add(new THREE.SphereGeometry(0.062*ss,20,20), BODY_MAT, s*sW, torsoY+torH/2-0.04, 0));

  // ARMS
  const armLen = 0.58 * arS;
  [-1,1].forEach(s => {
    const uLen = armLen * 0.52;
    const lLen = armLen * 0.48;
    const ang  = s * Math.PI/2.1;
    const sx   = s * sW;
    const sy   = torsoY + torH/2 - 0.05;

    // upper
    const u = add(new THREE.CylinderGeometry(0.038,0.033,uLen,14), BODY_MAT, sx + s*uLen/2*0.92, sy-0.05, 0, 0,0,ang);
    // elbow
    const ex = sx + s*uLen*Math.sin(Math.abs(ang));
    const ey = sy - 0.05 - uLen*Math.cos(Math.abs(ang));
    add(new THREE.SphereGeometry(0.035,14,14), DARK_MAT, ex,ey,0);
    // lower
    add(new THREE.CylinderGeometry(0.033,0.026,lLen,14), DARK_MAT, ex+s*lLen/2*0.5, ey-lLen*0.46, 0, 0,0,s*Math.PI/3.8);
  });

  // HIPS connector
  add(new THREE.CylinderGeometry(hipR+0.005, hipR+0.005, 0.04, 32), DARK_MAT, 0, hipY+0.02, 0);

  // LEGS
  [-1,1].forEach(s => {
    const lx  = s * 0.09 * hpS;
    const uLH = legH * 0.53;
    const lLH = legH * 0.47;
    add(new THREE.CylinderGeometry(0.058,0.048,uLH,16), BODY_MAT, lx, hipY-uLH/2, 0);
    add(new THREE.SphereGeometry(0.046,14,14), DARK_MAT, lx, hipY-uLH, 0);
    add(new THREE.CylinderGeometry(0.046,0.034,lLH,16), BODY_MAT, lx, hipY-uLH-lLH/2, 0);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.065,0.04,0.14), DARK_MAT);
    foot.position.set(lx, Y0+0.02, 0.04);
    foot.castShadow = true;
    root.add(foot);
  });
}

// ═══════════════════════════════════════════════
// CLOTHING ON MANNEQUIN
// ═══════════════════════════════════════════════
function renderClothing() {
  while (clothGrp.children.length) clothGrp.remove(clothGrp.children[0]);
  if (!parts.torsoY) return;

  const { torsoY, torH, chestR, waistR, hipR, hipY, legH, sW } = parts;

  function clothAdd(geo, mat, x,y,z, rx=0,ry=0,rz=0) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x,y,z); m.rotation.set(rx,ry,rz); m.castShadow=true;
    clothGrp.add(m);
  }

  if (wearing.upper) {
    const col = new THREE.Color(wearing.upper.color || '#888');
    const mat = new THREE.MeshStandardMaterial({ color:col, roughness:0.8, side:THREE.DoubleSide });

    // Body of garment
    clothAdd(latheTorso(chestR+0.014, waistR+0.012, hipR+0.006, torH*0.75), mat, 0, torsoY+torH*0.12, 0);

    // Sleeves
    const armLen = 0.58 * (M.arm_length_cm/65);
    [-1,1].forEach(s => {
      const sLen = armLen * 0.58;
      const ang  = s*Math.PI/2.1;
      const sx   = s*sW + s*sLen/2*0.92;
      const sy   = torsoY+torH/2-0.09;
      clothAdd(new THREE.CylinderGeometry(0.05,0.044,sLen,14), mat, sx,sy,0, 0,0,ang);
    });

    // Collar ring
    const colMat = new THREE.MeshStandardMaterial({ color:col, roughness:0.9 });
    clothAdd(new THREE.TorusGeometry(0.062,0.013,10,32), colMat, 0, torsoY+torH/2, 0, Math.PI/2,0,0);

    if (wearing.upper.texture) {
      new THREE.TextureLoader().load(wearing.upper.texture, t => { mat.map=t; mat.needsUpdate=true; });
    }
  }

  if (wearing.lower) {
    const col = new THREE.Color(wearing.lower.color || '#444');
    const mat = new THREE.MeshStandardMaterial({ color:col, roughness:0.85, side:THREE.DoubleSide });
    const lgS = M.leg_length_cm/90;
    const hpS = M.hips_cm/98;
    const lLen = legH * 0.95;

    // Waistband
    clothAdd(new THREE.CylinderGeometry(hipR+0.016,hipR+0.012,0.08,32), mat, 0,hipY+0.02,0);

    // Trouser legs
    [-1,1].forEach(s => {
      const lx = s*0.09*hpS;
      clothAdd(new THREE.CylinderGeometry(0.066,0.056,lLen*0.53,16), mat, lx,hipY-lLen*0.53/2,0);
      clothAdd(new THREE.CylinderGeometry(0.055,0.044,lLen*0.47,16), mat, lx,hipY-lLen*0.53-lLen*0.47/2,0);
    });

    if (wearing.lower.texture) {
      new THREE.TextureLoader().load(wearing.lower.texture, t => { mat.map=t; mat.needsUpdate=true; });
    }
  }
}

// ═══════════════════════════════════════════════
// ORBIT CONTROLS
// ═══════════════════════════════════════════════
let down=false, lx=0, ly=0, rotY=0, rotX=0.05, zoom=3.5;
canvas.addEventListener('mousedown', e=>{ down=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup',   ()=>down=false);
window.addEventListener('mousemove', e=>{
  if(!down) return;
  rotY += (e.clientX-lx)*0.012; lx=e.clientX;
  rotX += (e.clientY-ly)*0.006; ly=e.clientY;
  rotX = Math.max(-0.4, Math.min(0.6, rotX));
});
canvas.addEventListener('wheel', e=>{ zoom=Math.max(1.5,Math.min(6,zoom+e.deltaY*0.005)); }, {passive:true});

// ═══════════════════════════════════════════════
// DRAG AND DROP
// ═══════════════════════════════════════════════
function dragOver(e) {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.add('on');
}
function dragLeave() {
  document.getElementById('drop-overlay').classList.remove('on');
}
function dropItem(e) {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('on');
  if (!dragData) return;
  wearing[dragData.type] = dragData;
  renderClothing();
  renderWorn();
  toast(dragData.name + ' applied!');
  dragData = null;
}

// ═══════════════════════════════════════════════
// CLOTHING PANEL
// ═══════════════════════════════════════════════
const SAMPLES = [
  { name:'White Tee',    type:'upper', color:'#f0ede8', accent:'#d8d5d0' },
  { name:'Dark Jeans',   type:'lower', color:'#1a2744', accent:'#243460' },
  { name:'Black Hoodie', type:'upper', color:'#1c1c1e', accent:'#2e2e35' },
  { name:'Khaki Chinos', type:'lower', color:'#b5a07a', accent:'#9a8a6a' },
  { name:'Navy Blazer',  type:'upper', color:'#1b2a4a', accent:'#243460' },
];

function buildPanel() {
  const list = document.getElementById('cloth-list');
  list.innerHTML = '';
  items.forEach(item => {
    const d = document.createElement('div');
    d.className = 'cloth-card';
    d.draggable = true;
    d.innerHTML = `
      <div class="cloth-preview">
        ${item.processedSrc
          ? `<img src="${item.processedSrc}" alt="${item.name}">`
          : `<svg width="50" height="58" viewBox="0 0 50 58">
              ${item.type==='upper'
                ? `<path d="M12 4 L4 16 L12 18 L12 46 L38 46 L38 18 L46 16 L38 4 Q30 10 25 10 Q20 10 12 4Z" fill="${item.color}" stroke="${item.accent}" stroke-width="0.8"/>`
                : `<path d="M4 4 L7 54 L20 54 L25 26 L30 54 L43 54 L46 4Z" fill="${item.color}" stroke="${item.accent}" stroke-width="0.8"/>`
              }
            </svg>`
        }
      </div>
      <div class="cloth-name">${item.name}</div>
      <div class="cloth-type">${item.type}</div>
    `;
    d.addEventListener('dragstart', () => dragData = item);
    list.appendChild(d);
  });
}

function addItem(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const src = ev.target.result;
    document.getElementById('proc').classList.add('on');
    const processed = await removeBG(src);
    document.getElementById('proc').classList.remove('on');
    const name = file.name.replace(/\.[^/.]+$/,'');
    const isLower = /jean|pant|trouser|short|skirt|chino/i.test(name);
    // Get dominant color
    const col = await getDominantColor(processed);
    items.push({ name, type:isLower?'lower':'upper', color:col, accent:col, processedSrc:processed, texture:processed });
    buildPanel();
    toast(name + ' added!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════
// BACKGROUND REMOVAL
// ═══════════════════════════════════════════════
function removeBG(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width=img.width; c.height=img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img,0,0);
      const id = ctx.getImageData(0,0,c.width,c.height);
      const d  = id.data;
      const W  = c.width, H = c.height;

      // Sample background from border pixels
      let rS=0,gS=0,bS=0,n=0;
      for (let x=0;x<W;x++) {
        [[x,0],[x,H-1]].forEach(([px,py])=>{
          const i=(py*W+px)*4;
          rS+=d[i];gS+=d[i+1];bS+=d[i+2];n++;
        });
      }
      for (let y=1;y<H-1;y++) {
        [[0,y],[W-1,y]].forEach(([px,py])=>{
          const i=(py*W+px)*4;
          rS+=d[i];gS+=d[i+1];bS+=d[i+2];n++;
        });
      }
      const bgR=rS/n, bgG=gS/n, bgB=bS/n;

      const thr=45;
      for (let i=0;i<d.length;i+=4) {
        const dr=d[i]-bgR, dg=d[i+1]-bgG, db=d[i+2]-bgB;
        const dist=Math.sqrt(dr*dr+dg*dg+db*db);
        if (dist<thr) d[i+3]=0;
        else if (dist<thr*2) d[i+3]=Math.round(((dist-thr)/thr)*255);
      }
      ctx.putImageData(id,0,0);
      resolve(c.toDataURL('image/png'));
    };
    img.src=src;
  });
}

function getDominantColor(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width=16; c.height=16;
      c.getContext('2d').drawImage(img,0,0,16,16);
      const d = c.getContext('2d').getImageData(0,0,16,16).data;
      let r=0,g=0,b=0,n=0;
      for (let i=0;i<d.length;i+=4) {
        if (d[i+3]>128) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
      }
      if (!n) return resolve('#888888');
      const toHex = v => Math.round(v/n).toString(16).padStart(2,'0');
      resolve('#'+toHex(r)+toHex(g)+toHex(b));
    };
    img.src=src;
  });
}

// ═══════════════════════════════════════════════
// WORN LIST
// ═══════════════════════════════════════════════
function renderWorn() {
  const list = document.getElementById('worn-list');
  const wItems = Object.values(wearing);
  if (!wItems.length) {
    list.innerHTML = '<div class="empty" id="empty-msg">Drag clothing onto the mannequin to try it on</div>';
    return;
  }
  list.innerHTML = '';
  wItems.forEach(item => {
    const d = document.createElement('div');
    d.className = 'worn-item';
    d.innerHTML = `
      <div class="swatch" style="background:${item.color}"></div>
      <div style="flex:1">
        <div class="wi-name">${item.name}</div>
        <div class="wi-type">${item.type}</div>
      </div>
      <button class="rm" onclick="removeWorn('${item.type}')">✕</button>
    `;
    list.appendChild(d);
  });
}

function removeWorn(type) {
  delete wearing[type];
  renderClothing();
  renderWorn();
}

function clearOutfit() {
  wearing={};
  renderClothing();
  renderWorn();
  toast('Outfit cleared');
}

function saveOutfit() {
  const blob = new Blob([JSON.stringify({ measurements:M, wearing:Object.keys(wearing).map(k=>({type:k,name:wearing[k].name})), savedAt:new Date().toISOString() },null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='outfit.json';
  a.click();
  toast('Outfit saved!');
}

// ═══════════════════════════════════════════════
// MEASUREMENTS
// ═══════════════════════════════════════════════
function loadJSON(e) {
  const file=e.target.files[0];
  if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      M={...M,...JSON.parse(ev.target.result)};
      updateDisplays();
      buildMannequin();
      renderClothing();
      toast('Mannequin updated to your measurements!');
    } catch { toast('Invalid JSON file'); }
  };
  r.readAsText(file);
  e.target.value='';
}

function updateDisplays() {
  const f=(v,u='cm')=>v?`${v}<small>${u}</small>`:'—';
  document.getElementById('hh').textContent   = M.height_cm    ?M.height_cm+'cm'    :'—';
  document.getElementById('hc').textContent   = M.chest_cm     ?M.chest_cm+'cm'     :'—';
  document.getElementById('hw').textContent   = M.waist_cm     ?M.waist_cm+'cm'     :'—';
  document.getElementById('hhip').textContent = M.hips_cm      ?M.hips_cm+'cm'      :'—';
  document.getElementById('ha').textContent   = M.arm_length_cm?M.arm_length_cm+'cm':'—';
  document.getElementById('rh').innerHTML     = f(M.height_cm);
  document.getElementById('rc').innerHTML     = f(M.chest_cm);
  document.getElementById('rw').innerHTML     = f(M.waist_cm);
  document.getElementById('rhip').innerHTML   = f(M.hips_cm);
  document.getElementById('ra').innerHTML     = f(M.arm_length_cm);
  document.getElementById('rl').innerHTML     = f(M.leg_length_cm);
}

// ═══════════════════════════════════════════════
// RESIZE + RENDER LOOP
// ═══════════════════════════════════════════════
function resize() {
  const w=stageEl.clientWidth, h=stageEl.clientHeight;
  if (!w||!h) return;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}

function animate() {
  requestAnimationFrame(animate);
  root.rotation.y = rotY;
  root.rotation.x = rotX;
  camera.position.x = Math.sin(rotY)*zoom;
  camera.position.y = 0.3 + rotX*0.5;
  camera.position.z = Math.cos(rotY)*zoom;
  camera.lookAt(0,0.1,0);
  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  toastTimer=setTimeout(()=>t.classList.remove('on'),2500);
}

// ═══════════════════════════════════════════════
// INIT — wait for DOM layout to be ready
// ═══════════════════════════════════════════════
window.addEventListener('load', () => {
  SAMPLES.forEach(s=>items.push(s));
  buildPanel();
  resize();
  buildMannequin();
  animate();
});
window.addEventListener('resize', resize);
</script>
